<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Calorie Tracker</title>
</head>
<body>

    <h2>สมัครสมาชิกใหม่</h2>
    <p>กรอกข้อมูลด้านล่างเพื่อเริ่มต้นติดตามแคลอรี่ของคุณ</p>
    
    <form id="registerForm">
        <div>
            <label>ชื่อผู้ใช้ (Username):</label><br>
            <input type="text" id="regUsername" required>
        </div>
        <br>
        
        <div>
            <label>รหัสผ่าน (Password):</label><br>
            <input type="password" id="regPassword" required>
        </div>
        <br>

        <div>
            <label>อีเมล (Email):</label><br>
            <input type="email" id="regEmail" required>
        </div>
        <br>

        <div>
            <label>น้ำหนัก (กิโลกรัม):</label><br>
            <input type="number" id="regWeight" step="0.1" placeholder="เช่น 65.5">
        </div>
        <br>

        <div>
            <label>ส่วนสูง (เซนติเมตร):</label><br>
            <input type="number" id="regHeight" step="0.1" placeholder="เช่น 170">
        </div>
        <br>
        <div>
            <label>อายุ (ปี):</label><br>
            <input type="number" id="regAge" min="1" placeholder="เช่น 25">
        </div>
        <br>

        <div>
            <label>เพศ (Gender):</label><br>
            <select id="regGender">
                <option value="">-- ไม่ระบุ --</option>
                <option value="male">ชาย</option>
                <option value="female">หญิง</option>
            </select>
        </div>
        <br>

        <div>
            <label>ระดับการทำกิจกรรม (Activity Level):</label><br>
            <select id="regActivityLevel">
                <option value="">-- เลือกระดับกิจกรรม --</option>
                <option value="sedentary">ไม่ออกกำลังกายเลย (นั่งทำงานทั้งวัน)</option>
                <option value="lightly_active">ออกกำลังกายเบาๆ (1-3 วัน/สัปดาห์)</option>
                <option value="moderately_active">ออกกำลังกายปานกลาง (3-5 วัน/สัปดาห์)</option>
                <option value="very_active">ออกกำลังกายหนัก (6-7 วัน/สัปดาห์)</option>
                <option value="extra_active">ออกกำลังกายหนักมาก (นักกีฬา/ทำงานใช้แรง)</option>
            </select>
        </div>
        <br>

        <div>
            <label>เป้าหมายของคุณ (Goal):</label><br>
            <select id="regGoal">
                <option value="maintain">รักษาน้ำหนัก</option>
                <option value="lose">ลดน้ำหนัก (ลดแคลอรี่)</option>
                <option value="gain">เพิ่มน้ำหนัก (เพิ่มกล้ามเนื้อ)</option>
            </select>
        </div>
        <br>
        
        <button type="submit">ยืนยันการสมัครสมาชิก</button>
    </form>

    <p id="errorMessage" style="color: red;"></p>

    <br><hr>
    <p>มีบัญชีอยู่แล้วใช่ไหม? <a href="index.html">กลับไปหน้าเข้าสู่ระบบ</a></p>


    <script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // ดึงข้อมูลพื้นฐาน
            const usernameInput = document.getElementById('regUsername').value.trim();
            const passwordInput = document.getElementById('regPassword').value.trim();
            const emailInput = document.getElementById('regEmail').value.trim();
            
            // ดึงข้อมูลร่างกาย (ถ้าไม่กรอกให้ส่งค่าว่างไป)
            const weightInput = document.getElementById('regWeight').value || null;
            const heightInput = document.getElementById('regHeight').value || null;

            // ดึงข้อมูลที่เพิ่มมาใหม่ 3 ตัว 
            const ageInput = document.getElementById('regAge').value || null;
            const genderInput = document.getElementById('regGender').value || null;
            const activityLevelInput = document.getElementById('regActivityLevel').value || null;
            
            //ดึงค่า goal
            const goalInput = document.getElementById('regGoal').value;

            const errorText = document.getElementById('errorMessage');
            errorText.innerText = ''; 

            try {
                const response = await fetch('http://localhost:3000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username: usernameInput, 
                        password: passwordInput,
                        email: emailInput,
                        weight: weightInput,
                        height: heightInput,
                        age: ageInput,
                        gender: genderInput,
                        activity_level: activityLevelInput,
                
                        goal: document.getElementById('regGoal').value 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('🎉 สมัครสมาชิกสำเร็จ! ระบบจะพาคุณไปหน้าเข้าสู่ระบบ');
                    window.location.href = 'index.html';
                } else {
                    errorText.innerText = data.error || 'เกิดข้อผิดพลาดในการสมัครสมาชิก';
                }

            } catch (error) {
                console.error('Error:', error);
                errorText.innerText = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่';
            }
        });
    </script>
</body>
</html>
